run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - gocritic
    - bodyclose
    - nakedret
    - prealloc

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
  goimports:
    local-prefixes: github.com/modelrouter/router
